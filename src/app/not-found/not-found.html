<div class="relative min-h-screen bg-[#0f172a] text-slate-300 flex items-center justify-center p-6 overflow-hidden font-sans selection:bg-[#3b82f6] selection:text-white flex-col">
  
  <!-- Abstract Background Elements -->
  <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-[#ef4444] opacity-10 blur-[120px] animate-blob"></div>
    <div class="absolute bottom-[0%] -right-[10%] w-[60%] h-[60%] rounded-full bg-[#b91c1c] opacity-10 blur-[120px] animate-blob animation-delay-2000"></div>
  </div>

  <div class="w-full max-w-lg relative z-10 animate-fade-in-up text-center">
    
    <!-- Animated Error Icon -->
    <div class="flex justify-center mb-8">
      <div class="relative">
        <div class="absolute inset-0 bg-red-500 opacity-20 blur-xl rounded-full animate-pulse"></div>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-32 w-32 text-red-500 relative z-10 animate-bounce" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
      </div>
    </div>

    <!-- 404 Text -->
    <h1 class="text-7xl md:text-9xl font-extrabold text-transparent bg-clip-text bg-gradient-to-br from-slate-100 to-slate-500 tracking-tighter mb-4 animate-fade-in-up animation-delay-200">
      404
    </h1>
    <h2 class="text-2xl md:text-3xl font-bold text-white mb-6 animate-fade-in-up animation-delay-400">
      Page Not Found
    </h2>
    <p class="text-slate-400 text-lg mb-10 max-w-md mx-auto animate-fade-in-up animation-delay-600">
      The page you're looking for doesn't exist or has been moved. Please check the URL or navigate back to safety.
    </p>

    <!-- Back to Dashboard Button -->
    <div class="animate-fade-in-up animation-delay-2000">
      <a routerLink="/dash" class="inline-flex items-center gap-2 px-8 py-4 rounded-xl bg-gradient-to-r from-[#2d4f96] to-[#1e3a8a] text-white font-semibold text-lg hover:from-[#3b82f6] hover:to-[#2d4f96] transition-all duration-300 shadow-[0_0_20px_rgba(45,79,150,0.3)] hover:shadow-[0_0_25px_rgba(59,130,246,0.5)] transform hover:-translate-y-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
        </svg>
        Return to Dashboard
      </a>
    </div>

  </div>
</div>
