<div class="dialog-backdrop">
  <div class="dialog-panel">

    <!-- Header -->
    <div class="dialog-header">
      <div class="header-left">
        <div class="edit-icon-wrap">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5
                 m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
          </svg>
        </div>
        <div>
          <h2 class="dialog-title">Edit Employee</h2>
          <span class="dialog-subtitle">{{ data.name }} &bull; {{ data.id }}</span>
        </div>
      </div>
      <button class="close-btn" (click)="cancel()" id="edit-close-btn">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <div class="divider"></div>

    <!-- Form -->
    <form class="edit-form" (ngSubmit)="save()">

      <!-- Department -->
      <div class="form-group">
        <label class="form-label" for="edit-department">Department</label>
        <select id="edit-department" class="form-select" [(ngModel)]="form.department" name="department">
          <option *ngFor="let d of departments" [value]="d">{{ d }}</option>
        </select>
      </div>

      <!-- Designation -->
      <div class="form-group">
        <label class="form-label" for="edit-designation">Designation</label>
        <input id="edit-designation" type="text" class="form-input"
          [(ngModel)]="form.designation" name="designation"
          placeholder="e.g. Software Engineer">
      </div>

      <!-- Status -->
      <div class="form-group">
        <label class="form-label" for="edit-status">Status</label>
        <select id="edit-status" class="form-select" [(ngModel)]="form.status" name="status">
          <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
        </select>
      </div>

      <!-- Address -->
      <div class="form-group full-width">
        <label class="form-label" for="edit-address">Address</label>
        <textarea id="edit-address" class="form-textarea"
          [(ngModel)]="form.address" name="address"
          rows="3" placeholder="Enter full address"></textarea>
      </div>

    </form>

    <!-- Footer -->
    <div class="dialog-footer">
      <button class="btn-cancel" type="button" (click)="cancel()" id="edit-cancel-btn">Cancel</button>
      <button class="btn-save" type="button" (click)="save()" id="edit-save-btn">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M5 13l4 4L19 7"/>
        </svg>
        Save Changes
      </button>
    </div>

  </div>
</div>
