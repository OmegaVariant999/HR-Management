<aside class="flex flex-col w-64 h-screen px-4 py-8 overflow-y-auto bg-white border-r border-gray-100">
    
    <!-- Header/Logo -->
    <div class="flex items-center px-2 mb-8">
        <div class="p-2 bg-sky-500 rounded-lg shrink-0">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
        </div>
        <span class="mx-3 text-xl font-bold text-gray-800 tracking-tight">Smart HRMS</span>
    </div>

    <!-- Navigation -->
    <div class="flex flex-col justify-between flex-1">
        <nav class="space-y-1">
            <p class="px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Main Modules</p>
            
            <!-- Dashboard -->
            <a routerLink="/dash" routerLinkActive="bg-sky-50 text-sky-600" [routerLinkActiveOptions]="{exact: true}"
               class="flex items-center px-4 py-2.5 mt-2 text-gray-500 transition-colors duration-200 rounded-lg hover:bg-gray-50 hover:text-gray-800 group">
                <svg class="w-5 h-5 transition-colors group-hover:text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                <span class="mx-4 font-medium">Dashboard</span>
            </a>

            <!-- Employees -->
            <a routerLink="/emp" routerLinkActive="bg-sky-50 text-sky-600"
               class="flex items-center px-4 py-2.5 mt-2 text-gray-500 transition-colors duration-200 rounded-lg hover:bg-gray-50 hover:text-gray-800 group">
                <svg class="w-5 h-5 transition-colors group-hover:text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <span class="mx-4 font-medium">Employees</span>
            </a>

            <!-- Attendance -->
            <a routerLink="/attn" routerLinkActive="bg-sky-50 text-sky-600"
               class="flex items-center px-4 py-2.5 mt-2 text-gray-500 transition-colors duration-200 rounded-lg hover:bg-gray-50 hover:text-gray-800 group">
                <svg class="w-5 h-5 transition-colors group-hover:text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span class="mx-4 font-medium">Attendance</span>
            </a>

            <!-- Leave Management -->
            <a routerLink="/leavemng" routerLinkActive="bg-sky-50 text-sky-600"
               class="flex items-center px-4 py-2.5 mt-2 text-gray-500 transition-colors duration-200 rounded-lg hover:bg-gray-50 hover:text-gray-800 group">
                <svg class="w-5 h-5 transition-colors group-hover:text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <span class="mx-4 font-medium">Leave Management</span>
            </a>

            <!-- Payroll -->
            <a routerLink="/pay" routerLinkActive="bg-sky-50 text-sky-600"
               class="flex items-center px-4 py-2.5 mt-2 text-gray-500 transition-colors duration-200 rounded-lg hover:bg-gray-50 hover:text-gray-800 group">
                <svg class="w-5 h-5 transition-colors group-hover:text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
                <span class="mx-4 font-medium">Payroll</span>
            </a>
        </nav>

        <!-- Profile and Settings (Bottom) -->
        <nav class="space-y-1">
            <a routerLink="/prof" routerLinkActive="bg-sky-50 text-sky-600"
               class="flex items-center px-4 py-2.5 mt-2 text-gray-500 transition-colors duration-200 rounded-lg hover:bg-gray-50 hover:text-gray-800 group">
                <svg class="w-5 h-5 transition-colors group-hover:text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
                <span class="mx-4 font-medium">Profile</span>
            </a>

            <a routerLink="/settings" routerLinkActive="bg-sky-50 text-sky-600"
               class="flex items-center px-4 py-2.5 mt-2 text-gray-500 transition-colors duration-200 rounded-lg hover:bg-gray-50 hover:text-gray-800 group">
                <svg class="w-5 h-5 transition-colors group-hover:text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <span class="mx-4 font-medium">Settings</span>
            </a>

            <!-- Logout -->
            <a class="flex items-center px-4 py-2.5 mt-2 text-gray-500 transition-colors duration-200 rounded-lg hover:bg-red-50 hover:text-red-500 cursor-pointer group">
                <svg class="w-5 h-5 transition-colors group-hover:text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                <span class="mx-4 font-medium">Logout</span>
            </a>
        </nav>
    </div>
</aside>
