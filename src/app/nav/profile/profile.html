<div class="page">

  <!-- Header -->
  <div>
    <h1 class="page-title">My Profile</h1>
    <p class="page-subtitle">Manage your personal information and account settings.</p>
  </div>

  <!-- Profile Layout -->
  <div class="profile-layout">

    <!-- Left Column -->
    <div style="display:flex;flex-direction:column;gap:16px;">

      <!-- Avatar Card -->
      <div class="card avatar-card">
        <div class="avatar-wrap">
          <div class="avatar-circle">SM</div>
          <button class="avatar-edit-btn" id="profile-avatar-btn">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          </button>
        </div>
        <p class="profile-name">{{ userName() }}</p>
        <p class="profile-role">{{ userRole() }}</p>
        <p class="profile-since">Account created January 2026</p>
      </div>

      <!-- Settings Links -->
      <div class="card">
        <p class="settings-label">Account Settings</p>
        <nav class="settings-nav">
          <button class="settings-btn" id="profile-change-pw-btn">Change Password</button>
          <button class="settings-btn" id="profile-notif-btn">Notification Settings</button>
          <button class="settings-btn danger" id="profile-delete-btn">Delete Account</button>
        </nav>
      </div>
    </div>

    <!-- Right Column: Form -->
    <div class="card form-card">

      <h3 class="form-section-title">General Information</h3>
      <div class="form-grid">
        <div class="field">
          <label>Full Name</label>
          <input id="profile-name" type="text" [value]="userName()" readonly>
        </div>
        <div class="field">
          <label>Email Address</label>
          <input id="profile-email" type="email" [value]="userEmail()">
        </div>
        <div class="field">
          <label>Phone Number</label>
          <input id="profile-phone" type="text" [value]="userPhone()">
        </div>
        <div class="field">
          <label>Location</label>
          <input id="profile-location" type="text" [value]="userLocation()">
        </div>
      </div>

      <h3 class="form-section-title">Professional Details</h3>
      <div class="form-grid">
        <div class="field">
          <label>Employee ID</label>
          <div class="static-field">EMP001</div>
        </div>
        <div class="field">
          <label>Joining Date</label>
          <div class="static-field">12 December 2025</div>
        </div>
      </div>

      <div class="form-footer">
        <button class="btn-save" id="profile-save-btn">Save Changes</button>
      </div>
    </div>

  </div>
</div>
