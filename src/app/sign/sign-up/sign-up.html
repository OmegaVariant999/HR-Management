<div class="min-h-screen bg-[#0f172a] text-slate-300 flex items-center justify-center p-6 relative overflow-hidden font-sans selection:bg-[#3b82f6] selection:text-white">
  
  <!-- Abstract Background Elements -->
  <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
    <div class="absolute -bottom-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-[#1e3a8a] opacity-20 blur-[120px] animate-blob"></div>
    <div class="absolute top-[0%] -right-[10%] w-[60%] h-[60%] rounded-full bg-[#2d4f96] opacity-20 blur-[120px] animate-blob animation-delay-2000"></div>
  </div>

  <div class="w-full max-w-md relative z-10 animate-fade-in-up">
    <!-- Logo -->
    <div class="flex flex-col items-center mb-10 cursor-pointer group" routerLink="/">
      <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-[#3b82f6] to-[#1e3a8a] flex items-center justify-center shadow-lg shadow-blue-900/20 group-hover:shadow-blue-900/40 transition-all duration-300 mb-4 transform group-hover:-translate-y-1 group-hover:scale-105">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
        </svg>
      </div>
      <span class="text-3xl font-bold tracking-wide text-white transition-colors duration-300">Aegis<span class="text-blue-500">HR</span></span>
      <p class="text-slate-400 text-sm mt-2 font-medium">Create your workspace account.</p>
    </div>

    <!-- Sign Up Form Container -->
    <div class="bg-[#111827] rounded-2xl shadow-2xl border border-slate-800/60 p-8 backdrop-blur-xl transform transition-all hover:border-slate-700/60 relative overflow-hidden">
      <!-- Top highlight -->
      <div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-[#3b82f6] to-transparent opacity-50"></div>

      <form (submit)="onSignUp($event)" class="space-y-6">
        
        <!-- Name Field -->
        <div class="space-y-2 animate-fade-in-up animation-delay-200">
          <label for="name" class="block text-sm font-medium text-slate-300 ml-1">Full Name</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-blue-400 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
              </svg>
            </div>
            <input type="text" id="name" required placeholder="John Doe" class="block w-full pl-11 pr-4 py-3 bg-[#0f172a] border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all duration-300 shadow-inner">
          </div>
        </div>

        <!-- Email Field -->
        <div class="space-y-2 animate-fade-in-up animation-delay-400">
          <label for="email" class="block text-sm font-medium text-slate-300 ml-1">Email Address</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-blue-400 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
                <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
              </svg>
            </div>
            <input type="email" id="email" required placeholder="name@company.com" class="block w-full pl-11 pr-4 py-3 bg-[#0f172a] border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all duration-300 shadow-inner">
          </div>
        </div>

        <!-- Password Field -->
        <div class="space-y-2 animate-fade-in-up animation-delay-600">
          <label for="password" class="block text-sm font-medium text-slate-300 ml-1">Password</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-blue-400 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
              </svg>
            </div>
            <input type="password" id="password" required placeholder="••••••••" class="block w-full pl-11 pr-4 py-3 bg-[#0f172a] border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all duration-300 shadow-inner">
          </div>
        </div>

        <!-- Submit Button -->
        <div class="pt-2 animate-fade-in-up animation-delay-2000">
          <button type="submit" class="w-full py-3.5 px-4 bg-gradient-to-r from-[#2d4f96] to-[#1e3a8a] text-white font-semibold rounded-xl hover:from-[#3b82f6] hover:to-[#2d4f96] focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-[#111827] shadow-[0_0_20px_rgba(45,79,150,0.3)] hover:shadow-[0_0_25px_rgba(59,130,246,0.5)] transform hover:-translate-y-0.5 transition-all duration-300 flex justify-center items-center gap-2 group">
            Create Account
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-70 group-hover:opacity-100 group-hover:translate-x-1 transition-all" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
            </svg>
          </button>
        </div>
      </form>
    </div>

    <!-- Login link -->
    <p class="text-center text-sm text-slate-400 mt-8 animate-fade-in-up animation-delay-4000">
      Already have an account? 
      <a routerLink="/login" class="font-semibold text-blue-400 hover:text-white transition-colors relative after:content-[''] after:absolute after:-bottom-0.5 after:left-0 after:w-0 after:h-[1px] after:bg-blue-400 hover:after:w-full after:transition-all after:duration-300">
        Sign In
      </a>
    </p>

  </div>
</div>
