<!-- Page Header -->
<div class="flex items-center justify-between mb-8">
    <div>
        <h1 class="text-2xl font-bold text-gray-800">Attendance Portal</h1>
        <p class="text-sm text-gray-500">Monitor and track daily employee presence.</p>
    </div>
    <div class="flex items-center gap-3">
        <button class="flex items-center px-4 py-2 border border-gray-200 bg-white rounded-lg text-gray-600 text-sm hover:bg-gray-50 transition-colors">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" /></svg>
            Filter
        </button>
        <button class="flex items-center px-4 py-2 bg-sky-500 text-white rounded-lg hover:bg-sky-600 transition-colors shadow-sm text-sm font-bold">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
            Export CSV
        </button>
    </div>
</div>

<!-- Calendar Controls -->
<div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between mb-6">
    <div class="flex items-center space-x-4">
        <button (click)="prevMonth()" 
                class="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </button>

        <h2 class="text-lg font-bold text-gray-800 min-w-[160px] text-center">
            {{ monthDisplay() }}
        </h2>

        <button (click)="nextMonth()" 
                class="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
        </button>
    </div>
    
    <div class="flex items-center space-x-6">
        <div class="flex items-center text-xs font-bold text-gray-400 uppercase tracking-widest">
            <span class="w-3 h-3 bg-green-500 rounded-full mr-2"></span> Present
        </div>
        <div class="flex items-center text-xs font-bold text-gray-400 uppercase tracking-widest">
            <span class="w-3 h-3 bg-red-500 rounded-full mr-2"></span> Absent
        </div>
        <div class="flex items-center text-xs font-bold text-gray-400 uppercase tracking-widest">
            <span class="w-3 h-3 bg-yellow-400 rounded-full mr-2"></span> Leave
        </div>
    </div>
</div>

<!-- Attendance Sheet Table -->
<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-gray-50 border-b border-gray-100">
                    <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider sticky left-0 bg-gray-50 z-10">Employee</th>
                    @for (day of getDaysArray(); track day) {
                        <th class="px-2 py-4 text-center text-[10px] font-bold text-gray-400 border-l border-gray-100">{{ day }}</th>
                    }
                    <th class="px-4 py-4 text-center text-xs font-bold text-gray-400 uppercase border-l border-gray-100">Total</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
                <tr class="hover:bg-gray-50/50 transition-colors">
                    <td class="px-6 py-4 sticky left-0 bg-white z-10 border-r border-gray-50">
                        <div class="flex items-center">
                            <div class="w-8 h-8 rounded-full bg-sky-100 text-sky-600 flex items-center justify-center font-bold text-[10px] mr-3 shrink-0">RS</div>
                            <div>
                                <p class="text-sm font-bold text-gray-800 leading-none">Rahul Sharma</p>
                                <p class="text-[10px] text-gray-400 mt-1">Engineer</p>
                            </div>
                        </div>
                    </td>
                    @for (day of getDaysArray(); track day) {
                        <td class="px-2 py-4 text-center border-l border-gray-50">
                            <!-- Mock logic for dots -->
                            <div [class.bg-green-500]="day % 7 !== 0" 
                                 [class.bg-red-500]="day % 7 === 0"
                                 class="w-2 h-2 rounded-full mx-auto"></div>
                        </td>
                    }
                    <td class="px-4 py-4 text-center text-sm font-bold text-gray-700 bg-gray-50/30">
                        {{ daysInMonth() - 4 }}/{{ daysInMonth() }}
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
