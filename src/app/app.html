<!-- HR_Management\src\app\app.html -->
<div class="flex h-screen overflow-hidden" [style.background]="showSidebar() ? '#111827' : '#0f172a'">
    @if (showSidebar()) {
    <app-sidebar></app-sidebar>
    }

    <main class="flex-1 overflow-y-auto">
        <router-outlet></router-outlet>
    </main>
</div>

<!-- Global Geometric Hero Transition Overlay -->
@if (transitionService.isTransitioning()) {
<div class="hero-transition-overlay"
  [style.--start-x.px]="transitionService.startX()"
  [style.--start-y.px]="transitionService.startY()"
  [style.--start-w.px]="transitionService.startW()"
  [style.--start-h.px]="transitionService.startH()">
  
  <div class="hero-card" [ngClass]="transitionService.transitionColor()"></div>
</div>
}
