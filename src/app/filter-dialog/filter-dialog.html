<div class="bg-[#0f172a] rounded-2xl overflow-hidden border border-gray-800/50 shadow-2xl">
  <!-- Header -->
  <div class="px-6 py-5 border-b border-gray-800/50 flex items-center justify-between bg-gradient-to-r from-[#111827] to-[#0f172a]">
    <h2 class="text-lg font-black text-[#e8f0fe] uppercase tracking-wider flex items-center gap-2">
      <svg class="w-5 h-5 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
      Advanced Search
    </h2>
    <button (click)="dialogRef.close()" class="text-gray-500 hover:text-white transition-colors bg-gray-800/40 hover:bg-gray-700/50 p-1.5 rounded-full">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>
  
  <!-- Body / Form -->
  <div class="p-6">
    <form class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5">
      
      <!-- Name Input -->
      <div class="flex flex-col gap-1.5">
        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest pl-1">Employee Name</label>
        <input type="text" [(ngModel)]="criteria.name" name="name" placeholder="e.g. Rahul Sharma" 
               class="px-4 py-2.5 bg-[#1a2236] border border-gray-700/50 rounded-lg text-sm text-[#e8f0fe] placeholder-gray-600 outline-none focus:ring-2 focus:ring-sky-500/40 focus:border-sky-500 transition-all">
      </div>

      <!-- ID Input -->
      <div class="flex flex-col gap-1.5">
        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest pl-1">Employee ID</label>
        <input type="text" [(ngModel)]="criteria.empId" name="empId" placeholder="e.g. EMP001" 
               class="px-4 py-2.5 bg-[#1a2236] border border-gray-700/50 rounded-lg text-sm text-[#e8f0fe] placeholder-gray-600 outline-none focus:ring-2 focus:ring-sky-500/40 focus:border-sky-500 transition-all">
      </div>

      <!-- Department Select -->
      <div class="flex flex-col gap-1.5">
        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest pl-1">Department</label>
        <select [(ngModel)]="criteria.department" name="department" 
                class="px-4 py-2.5 bg-[#1a2236] border border-gray-700/50 rounded-lg text-sm text-[#e8f0fe] outline-none focus:ring-2 focus:ring-sky-500/40 focus:border-sky-500 transition-all appearance-none cursor-pointer">
          <option value="">All Departments</option>
          <option value="engineering">Engineering</option>
          <option value="marketing">Marketing</option>
          <option value="sales">Sales</option>
        </select>
      </div>

      <!-- Designation Input -->
      <div class="flex flex-col gap-1.5">
        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest pl-1">Designation</label>
        <input type="text" [(ngModel)]="criteria.designation" name="designation" placeholder="e.g. Software Engineer" 
               class="px-4 py-2.5 bg-[#1a2236] border border-gray-700/50 rounded-lg text-sm text-[#e8f0fe] placeholder-gray-600 outline-none focus:ring-2 focus:ring-sky-500/40 focus:border-sky-500 transition-all">
      </div>

      <!-- Status Select -->
      <div class="flex flex-col gap-1.5 md:col-span-2">
        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest pl-1">Status</label>
        <select [(ngModel)]="criteria.status" name="status" 
                class="px-4 py-2.5 bg-[#1a2236] border border-gray-700/50 rounded-lg text-sm text-[#e8f0fe] outline-none focus:ring-2 focus:ring-sky-500/40 focus:border-sky-500 transition-all appearance-none cursor-pointer">
          <option value="">Any Status</option>
          <option value="active">Active</option>
          <option value="on-leave">On Leave</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>
    </form>
  </div>

  <!-- Footer Actions -->
  <div class="px-6 py-5 bg-gray-900/50 flex items-center justify-end gap-3 border-t border-gray-800/50">
    <button (click)="clear()" class="px-4 py-2.5 text-xs font-black text-gray-400 uppercase tracking-wider hover:text-gray-200 transition-colors">Clear All</button>
    <button (click)="apply()" class="px-8 py-2.5 bg-sky-600 text-white rounded-lg text-xs font-black hover:bg-sky-500 transition-all uppercase tracking-widest shadow-[0_0_15px_rgba(2,132,199,0.4)]">Apply Filters</button>
  </div>
</div>
