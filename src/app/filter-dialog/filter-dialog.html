
    <div class="p-6 bg-white rounded-2xl overflow-hidden">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-bold text-gray-800 uppercase tracking-wider">Advanced Search</h2>
        <button (click)="dialogRef.close()" class="text-gray-400 hover:text-gray-600 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
      </div>
      
      <form class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
        <!-- Name Input -->
        <div class="flex flex-col gap-1">
          <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Employee Name</label>
          <input type="text" placeholder="e.g. Rahul Sharma" class="px-4 py-2 border border-gray-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500">
        </div>

        <!-- ID Input -->
        <div class="flex flex-col gap-1">
          <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Employee ID</label>
          <input type="text" placeholder="e.g. EMP001" class="px-4 py-2 border border-gray-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500">
        </div>

        <!-- Department Select -->
        <div class="flex flex-col gap-1">
          <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Department</label>
          <select class="px-4 py-2 border border-gray-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-sky-500/20 bg-white">
            <option value="">All Departments</option>
            <option value="engineering">Engineering</option>
            <option value="marketing">Marketing</option>
            <option value="sales">Sales</option>
          </select>
        </div>

        <!-- Designation Input -->
        <div class="flex flex-col gap-1">
          <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Designation</label>
          <input type="text" placeholder="e.g. Software Engineer" class="px-4 py-2 border border-gray-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500">
        </div>

        <!-- Status Select -->
        <div class="flex flex-col gap-1 md:col-span-2">
          <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Status</label>
          <select class="px-4 py-2 border border-gray-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-sky-500/20 bg-white">
            <option value="">Any Status</option>
            <option value="active">Active</option>
            <option value="on-leave">On Leave</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </form>

      <div class="flex items-center justify-end mt-8 gap-3">
        <button (click)="dialogRef.close()" class="px-4 py-2 text-sm font-bold text-gray-400 uppercase hover:text-gray-600 transition-colors">Clear All</button>
        <button (click)="apply()" class="px-8 py-2.5 bg-sky-500 text-white rounded-lg text-sm font-bold shadow-md shadow-sky-100 hover:bg-sky-600 transition-all uppercase tracking-widest">Apply Filters</button>
      </div>
    </div>
